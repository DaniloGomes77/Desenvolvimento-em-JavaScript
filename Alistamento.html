<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alistamento Militar</title>
</head>
<body>
    <script type="text/javascript">
        var nome = prompt("Digite o nome do cidadão:");
        var idade = parseInt(prompt("Digite a idade do cidadão: "));
        if (idade >= 18) {
            alert(`O cidadão ${nome} tem ${idade} anos e deve se alistar`);
        }
        else {
            alert(`O cidadão ${nome} tem ${idade} anos e não deve se alistar`);
        }
    </script>
     
    
</body>
</html>
